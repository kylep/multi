# M2 — gaming machine, Rancher sometimes off. No scheduled agents; available for ad-hoc testing.
storageClass: local-path

paiResponder:
  enabled: false  # avoid duplicate Discord responses; M2 unreliable

cronjobs:
  journalist:
    enabled: false
    schedule: "0 12 * * *"
  paiMorning:
    enabled: false
    schedule: "30 12 * * *"
