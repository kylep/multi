# kyle-m2 — gaming machine, Rancher sometimes off. No scheduled agents; available for ad-hoc testing.
storageClass: local-path

argocd:
  enabled: false

paiResponder:
  enabled: false  # avoid duplicate Discord responses; kyle-m2 unreliable

cronjobs:
  journalist:
    morning:
      enabled: false
    noon:
      enabled: false
    evening:
      enabled: false
  healthcheck:
    enabled: false
  paiMorning:
    enabled: false
    schedule: "30 12 * * *"
