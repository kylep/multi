# pai-m1 — always-on server ("Pai's laptop"). Runs all scheduled agents and pai-responder.
storageClass: local-path

argocd:
  enabled: true

cloudflared:
  enabled: true

openobserve:
  enabled: true

paiResponder:
  enabled: true

cronjobs:
  journalist:
    morning:
      enabled: true
      schedule: "0 10 * * *"   # 6:00 AM EDT (10:00 UTC)
    noon:
      enabled: true
      schedule: "0 16 * * *"   # 12:00 PM EDT (16:00 UTC)
    evening:
      enabled: true
      schedule: "0 22 * * *"   # 6:00 PM EDT (22:00 UTC)
  healthcheck:
    enabled: true
    schedule: "0 11,17,23 * * *"  # 7am, 1pm, 7pm EDT (every 6h)
  paiMorning:
    enabled: true
    schedule: "30 12 * * *"  # 8:30am ET
