# pai-m1 — always-on server ("Pai's laptop"). Runs all scheduled agents and pai-responder.
storageClass: local-path

argocd:
  enabled: true

cloudflared:
  enabled: true

openobserve:
  enabled: true

paiResponder:
  enabled: true

cronjobs:
  journalist:
    enabled: true
    schedule: "0 12 * * *"   # 8am ET (12:00 UTC, EDT=UTC-4)
  paiMorning:
    enabled: true
    schedule: "30 12 * * *"  # 8:30am ET
