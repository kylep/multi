# Environment-specific overrides for the ai-agents stack.
# StorageClass used by Vault PVC and agent workspace volumes.
storageClass: local-path

# Default: all optional workloads disabled. Override in pai-m1.yaml/kyle-m2.yaml.
argocd:
  enabled: false

cloudflared:
  enabled: false

openobserve:
  enabled: false

paiResponder:
  enabled: false

cronjobs:
  journalist:
    morning:
      enabled: false
    noon:
      enabled: false
    evening:
      enabled: false
  healthcheck:
    enabled: false
  paiMorning:
    enabled: false
    schedule: "30 12 * * *"
