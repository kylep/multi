# Deploys HashiCorp Vault to every cluster labeled cluster-role=ai-agents.
# Uses ArgoCD multi-source (requires ArgoCD v2.6+): Helm chart from hashicorp repo
# + values file from this git repo.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: vault
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            cluster-role: ai-agents
  template:
    metadata:
      name: "vault-{{name}}"
    spec:
      project: default
      sources:
        - repoURL: https://helm.releases.hashicorp.com
          chart: vault
          targetRevision: "0.32.0"
          helm:
            valueFiles:
              - $values/infra/ai-agents/vault/values.yaml
        - repoURL: https://github.com/kylep/multi
          targetRevision: main
          ref: values
      destination:
        server: "{{server}}"
        namespace: vault
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
