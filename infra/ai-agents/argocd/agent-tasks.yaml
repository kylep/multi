# Deploys AgentTask CRs to every cluster labeled cluster-role=ai-agents.
# Cluster-specific values (environments/<name>.yaml) control which cronjobs are enabled
# and their schedules. M1: journalist + pai-morning enabled. M2: all disabled by default.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: agent-tasks
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            cluster-role: ai-agents
  template:
    metadata:
      name: "agent-tasks-{{name}}"
    spec:
      project: default
      source:
        repoURL: https://github.com/kylep/multi
        targetRevision: main
        path: infra/ai-agents/agent-tasks/helm
        helm:
          valueFiles:
            - ../../../infra/ai-agents/environments/{{name}}.yaml
      destination:
        server: "{{server}}"
        namespace: ai-agents
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
