# Deploys Traefik as an in-cluster reverse proxy to all ai-agents clusters.
# The Cloudflare tunnel points to traefik.traefik.svc.cluster.local:80.
# Path-based IngressRoutes handle per-service routing.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: traefik
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            cluster-role: ai-agents
  template:
    metadata:
      name: "traefik-{{name}}"
    spec:
      project: default
      source:
        repoURL: https://traefik.github.io/charts
        chart: traefik
        targetRevision: "34.*"
        helm:
          values: |
            service:
              type: ClusterIP
            ports:
              web:
                port: 80
                expose:
                  default: true
            ingressRoute:
              dashboard:
                enabled: false
      destination:
        server: "{{server}}"
        namespace: traefik
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
