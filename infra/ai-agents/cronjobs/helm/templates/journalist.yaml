apiVersion: batch/v1
kind: CronJob
metadata:
  name: journalist
  namespace: ai-agents
spec:
  schedule: {{ .Values.cronjobs.journalist.schedule | quote }}
  suspend: {{ not .Values.cronjobs.journalist.enabled }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 1800
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          annotations:
            vault.hashicorp.com/agent-inject: "true"
            vault.hashicorp.com/role: "ai-agents"
            # config: shell-sourceable env vars from three Vault paths
            vault.hashicorp.com/agent-inject-secret-config: "secret/ai-agents/discord"
            vault.hashicorp.com/agent-inject-template-config: |
              {{`{{- with secret "secret/ai-agents/discord" -}}`}}
              export DISCORD_BOT_TOKEN="{{`{{ .Data.data.discord_bot_token }}`}}"
              export DISCORD_GUILD_ID="{{`{{ .Data.data.discord_guild_id }}`}}"
              export DISCORD_LOG_CHANNEL_ID="{{`{{ .Data.data.discord_log_channel_id }}`}}"
              {{`{{- end -}}`}}
              {{`{{- with secret "secret/ai-agents/github" -}}`}}
              export GITHUB_APP_ID="{{`{{ .Data.data.github_app_id }}`}}"
              export GITHUB_INSTALL_ID="{{`{{ .Data.data.github_install_id }}`}}"
              {{`{{- end -}}`}}
              {{`{{- with secret "secret/ai-agents/anthropic" -}}`}}
              export CLAUDE_CODE_OAUTH_TOKEN="{{`{{ .Data.data.claude_oauth_token }}`}}"
              {{`{{- end -}}`}}
            # github-key: raw PEM written to a dedicated file (multiline-safe)
            vault.hashicorp.com/agent-inject-secret-github-key: "secret/ai-agents/github"
            vault.hashicorp.com/agent-inject-template-github-key: |
              {{`{{- with secret "secret/ai-agents/github" -}}{{ .Data.data.github_app_private_key }}{{- end -}}`}}
        spec:
          serviceAccountName: cronjob-agent
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            fsGroup: 1001
            seccompProfile:
              type: RuntimeDefault
          initContainers:
            - name: github-token
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["/bin/sh", "-c"]
              args:
                - |
                  . /vault/secrets/config
                  _header=$(printf '{"alg":"RS256","typ":"JWT"}' \
                    | openssl base64 -e -A | tr '+/' '-_' | tr -d '=')
                  _now=$(date +%s)
                  _iat=$((_now - 60))
                  _exp=$((_now + 300))
                  _payload=$(printf '{"iss":"%s","iat":%d,"exp":%d}' \
                    "$GITHUB_APP_ID" "$_iat" "$_exp" \
                    | openssl base64 -e -A | tr '+/' '-_' | tr -d '=')
                  _sig=$(printf '%s.%s' "$_header" "$_payload" \
                    | openssl dgst -sha256 -sign /vault/secrets/github-key -binary \
                    | openssl base64 -e -A | tr '+/' '-_' | tr -d '=')
                  _jwt="${_header}.${_payload}.${_sig}"
                  _token=$(curl -sf -X POST \
                    -H "Authorization: Bearer ${_jwt}" \
                    -H "Accept: application/vnd.github+json" \
                    "https://api.github.com/app/installations/${GITHUB_INSTALL_ID}/access_tokens" \
                    | jq -r '.token')
                  printf 'export GITHUB_TOKEN="%s"\n' "$_token" > /shared/github-token.sh
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: shared
                  mountPath: /shared
          containers:
            - name: agent
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["/bin/sh", "-c"]
              args:
                - |
                  . /vault/secrets/config
                  . /shared/github-token.sh

                  RUN_ID=$(head -c4 /dev/urandom | xxd -p)
                  curl -sf -X POST \
                    "https://discord.com/api/v10/channels/${DISCORD_LOG_CHANNEL_ID}/messages" \
                    -H "Authorization: Bot ${DISCORD_BOT_TOKEN}" \
                    -H "Content-Type: application/json" \
                    -d "{\"content\":\"\u25b6 ${RUN_ID} | agent=journalist | started\"}" || true

                  printf '%s' '{"mcpServers":{"discord":{"type":"stdio","command":"python3","args":["/workspace/repo/apps/mcp-servers/discord/server.py"]}}}' \
                    > /tmp/mcp.json

                  git clone \
                    "https://x-access-token:${GITHUB_TOKEN}@github.com/kylep/multi.git" \
                    /workspace/repo
                  cd /workspace/repo
                  git config user.name "PericakAI (Pai)"
                  git config user.email "pericakai@gmail.com"

                  claude --agent journalist \
                    -p "Search for yesterday's most notable AI news, announcements, and releases. Write a digest to the wiki journal. Determine today's date, create the directory apps/blog/blog/markdown/wiki/journal/YYYY-MM-DD/, and write ai-news.md there with proper wiki frontmatter. Include source URLs for every item. Commit with message 'journal: AI news digest for YYYY-MM-DD'. After committing, post a Discord message to #news using the Discord output format defined in your agent instructions. Include 2-6 stories (up to 7 only if each is genuinely unique and noteworthy). Start with the overview line — keep it witty, one sentence, no emojis." \
                    --mcp-config /tmp/mcp.json \
                    --allowedTools "WebSearch,WebFetch,Read,Glob,Grep,Write,Bash(mkdir -p apps/blog/blog/markdown/wiki/journal/*),Bash(git add apps/blog/blog/markdown/wiki/journal/*),Bash(git config user.name *),Bash(git config user.email *),Bash(git commit --no-verify *),Bash(date *),mcp__discord__send_message,mcp__discord__list_channels" \
                    --output-format stream-json
                  STATUS=$?

                  if [ $STATUS -eq 0 ]; then
                    git push origin HEAD
                    MSG="\u2713 ${RUN_ID} | agent=journalist | done"
                  else
                    MSG="\u2717 ${RUN_ID} | agent=journalist | failed"
                  fi
                  curl -sf -X POST \
                    "https://discord.com/api/v10/channels/${DISCORD_LOG_CHANNEL_ID}/messages" \
                    -H "Authorization: Bot ${DISCORD_BOT_TOKEN}" \
                    -H "Content-Type: application/json" \
                    -d "{\"content\":\"${MSG}\"}" || true
                  exit $STATUS
              resources:
                requests:
                  cpu: 100m
                  memory: 512Mi
                limits:
                  cpu: 1000m
                  memory: 2Gi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: shared
                  mountPath: /shared
                - name: workspace
                  mountPath: /workspace
          volumes:
            - name: shared
              emptyDir: {}
            - name: workspace
              emptyDir: {}
