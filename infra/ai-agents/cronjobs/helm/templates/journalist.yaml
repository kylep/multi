{{- range $name, $cfg := .Values.cronjobs.journalist }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: journalist-{{ $name }}
  namespace: ai-agents
spec:
  schedule: {{ $cfg.schedule | quote }}
  timeZone: "UTC"
  startingDeadlineSeconds: 3600
  suspend: {{ not $cfg.enabled }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 1800
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          annotations:
            vault.hashicorp.com/agent-inject: "true"
            vault.hashicorp.com/role: "ai-agents"
            vault.hashicorp.com/agent-inject-secret-config: "secret/ai-agents/discord"
            vault.hashicorp.com/agent-inject-template-config: |
              {{`{{- with secret "secret/ai-agents/discord" }}`}}
              export DISCORD_BOT_TOKEN="{{`{{ .Data.data.discord_bot_token }}`}}"
              export DISCORD_GUILD_ID="{{`{{ .Data.data.discord_guild_id }}`}}"
              export DISCORD_LOG_CHANNEL_ID="{{`{{ .Data.data.discord_log_channel_id }}`}}"
              {{`{{ end }}`}}
              {{`{{- with secret "secret/ai-agents/github" }}`}}
              export GITHUB_APP_ID="{{`{{ .Data.data.github_app_id }}`}}"
              export GITHUB_INSTALL_ID="{{`{{ .Data.data.github_install_id }}`}}"
              {{`{{ end }}`}}
              {{`{{- with secret "secret/ai-agents/anthropic" }}`}}
              export CLAUDE_CODE_OAUTH_TOKEN="{{`{{ .Data.data.claude_oauth_token }}`}}"
              {{`{{ end }}`}}
            vault.hashicorp.com/agent-inject-secret-github-key: "secret/ai-agents/github"
            vault.hashicorp.com/agent-inject-template-github-key: |
              {{`{{- with secret "secret/ai-agents/github" -}}{{ .Data.data.github_app_private_key }}{{- end -}}`}}
        spec:
          serviceAccountName: cronjob-agent
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            fsGroup: 1001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: agent
              image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
              imagePullPolicy: {{ $.Values.image.pullPolicy }}
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  . /vault/secrets/config

                  # --- GitHub token ---
                  gen_token() {
                    _header=$(printf '{"alg":"RS256","typ":"JWT"}' \
                      | openssl base64 -e -A | tr '+/' '-_' | tr -d '=')
                    _now=$(date +%s); _iat=$((_now - 60)); _exp=$((_now + 300))
                    _payload=$(printf '{"iss":"%s","iat":%d,"exp":%d}' \
                      "$GITHUB_APP_ID" "$_iat" "$_exp" \
                      | openssl base64 -e -A | tr '+/' '-_' | tr -d '=')
                    _sig=$(printf '%s.%s' "$_header" "$_payload" \
                      | openssl dgst -sha256 -sign /vault/secrets/github-key -binary \
                      | openssl base64 -e -A | tr '+/' '-_' | tr -d '=')
                    curl -sf -X POST \
                      -H "Authorization: Bearer ${_header}.${_payload}.${_sig}" \
                      -H "Accept: application/vnd.github+json" \
                      "https://api.github.com/app/installations/${GITHUB_INSTALL_ID}/access_tokens" \
                      | jq -r '.token'
                  }
                  GITHUB_TOKEN=$(gen_token)

                  RUN_ID=$(cat /proc/sys/kernel/random/uuid | tr -d '-' | cut -c1-8)
                  TODAY=$(date -u +%Y-%m-%d)
                  BRANCH="news-${TODAY}"
                  AGENT_NAME="journalist-{{ $name }}"

                  discord_post() {
                    curl -sf -X POST \
                      "https://discord.com/api/v10/channels/${DISCORD_LOG_CHANNEL_ID}/messages" \
                      -H "Authorization: Bot ${DISCORD_BOT_TOKEN}" \
                      -H "Content-Type: application/json" \
                      -d "{\"content\":\"$1\"}" || true
                  }
                  discord_post "\u25b6 ${RUN_ID} | agent=${AGENT_NAME} | started"

                  # --- Clone and set up branch ---
                  git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/kylep/multi.git" /workspace/repo
                  cd /workspace/repo
                  git config user.name "PericakAI (Pai)"
                  git config user.email "pericakai@gmail.com"

                  # Check if today's branch exists on remote
                  if git ls-remote --exit-code --heads origin "${BRANCH}" >/dev/null 2>&1; then
                    git fetch origin "${BRANCH}"
                    git checkout "${BRANCH}"
                    git merge origin/main --no-edit || true
                  else
                    git checkout -b "${BRANCH}"
                  fi

                  # --- MCP config ---
                  printf '%s' '{"mcpServers":{"discord":{"type":"stdio","command":"python3","args":["/workspace/repo/apps/mcp-servers/discord/server.py"]}}}' \
                    > /tmp/mcp.json

                  # --- Run journalist agent ---
                  claude --agent journalist \
                    -p "Run a news update. Today is ${TODAY}. Write to the wiki at apps/blog/blog/markdown/wiki/journal/news/${TODAY}/daily-digest.md — create the file if it does not exist, or append new sections if it does. Check both Discord #news (last 15 messages) and the existing wiki file for stories already covered so you do not post duplicates. Collect the news, write to the wiki, commit, then post to Discord #news. If you encounter any errors with git, file I/O, or other non-news problems, post a short error summary to Discord #news so the operator can fix it. Commit message: 'journal: AI news digest for ${TODAY}'." \
                    --mcp-config /tmp/mcp.json \
                    --allowedTools "WebSearch,WebFetch,Read,Glob,Grep,Write,Bash(mkdir -p apps/blog/blog/markdown/wiki/journal/news/*),Bash(git add apps/blog/blog/markdown/wiki/journal/*),Bash(git config user.name *),Bash(git config user.email *),Bash(git commit --no-verify *),Bash(date *),Bash(python3 bin/github-trending.py *),mcp__discord__send_message,mcp__discord__list_channels,mcp__discord__read_messages" \
                    --verbose \
                    --output-format stream-json
                  STATUS=$?

                  if [ $STATUS -eq 0 ]; then
                    GITHUB_TOKEN=$(gen_token)
                    git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/kylep/multi.git"
                    git push origin "${BRANCH}" || git push --force-with-lease origin "${BRANCH}"

                    # Create PR if one doesn't already exist
                    EXISTING_PR=$(curl -sf \
                      -H "Authorization: token ${GITHUB_TOKEN}" \
                      -H "Accept: application/vnd.github+json" \
                      "https://api.github.com/repos/kylep/multi/pulls?head=kylep:${BRANCH}&state=open" \
                      | jq 'length')
                    if [ "${EXISTING_PR}" = "0" ]; then
                      curl -sf -X POST \
                        -H "Authorization: token ${GITHUB_TOKEN}" \
                        -H "Accept: application/vnd.github+json" \
                        "https://api.github.com/repos/kylep/multi/pulls" \
                        -d "{\"title\":\"journal: AI news digest for ${TODAY}\",\"body\":\"Automated daily AI news digest (3x daily).\",\"head\":\"${BRANCH}\",\"base\":\"main\"}" || true
                    fi
                    MSG="\u2713 ${RUN_ID} | agent=${AGENT_NAME} | done"
                  else
                    MSG="\u2717 ${RUN_ID} | agent=${AGENT_NAME} | failed (exit ${STATUS})"
                  fi
                  discord_post "${MSG}"
                  exit $STATUS
              resources:
                requests:
                  cpu: 100m
                  memory: 512Mi
                limits:
                  cpu: 1000m
                  memory: 2Gi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: workspace
                  mountPath: /workspace
          volumes:
            - name: workspace
              emptyDir: {}
{{- end }}
