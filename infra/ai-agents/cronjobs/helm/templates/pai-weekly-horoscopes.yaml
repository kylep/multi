apiVersion: batch/v1
kind: CronJob
metadata:
  name: pai-weekly-horoscopes
  namespace: ai-agents
spec:
  schedule: {{ .Values.cronjobs.paiWeeklyHoroscopes.schedule | quote }}
  timeZone: "UTC"
  # 24h deadline so a missed Monday run still fires when the cluster wakes.
  # Safe because the prompt reads recent history and won't double-post.
  startingDeadlineSeconds: 86400
  suspend: {{ not .Values.cronjobs.paiWeeklyHoroscopes.enabled }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 600
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          annotations:
            vault.hashicorp.com/agent-inject: "true"
            vault.hashicorp.com/role: "ai-agents"
            vault.hashicorp.com/agent-inject-secret-config: "secret/ai-agents/pai"
            vault.hashicorp.com/agent-inject-template-config: |
              {{`{{- with secret "secret/ai-agents/pai" }}`}}
              export DISCORD_BOT_TOKEN="{{`{{ .Data.data.discord_bot_token }}`}}"
              export CLAUDE_CODE_OAUTH_TOKEN="{{`{{ .Data.data.claude_oauth_token }}`}}"
              export LINEAR_API_KEY="{{`{{ .Data.data.linear_api_key }}`}}"
              {{`{{ end }}`}}
              {{`{{- with secret "secret/ai-agents/discord" }}`}}
              export DISCORD_GUILD_ID="{{`{{ .Data.data.discord_guild_id }}`}}"
              {{`{{ end }}`}}
        spec:
          serviceAccountName: cronjob-agent
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            fsGroup: 1001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: agent
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["/bin/sh", "-c"]
              args:
                - |
                  . /vault/secrets/config

                  printf '%s' '{"mcpServers":{"pai-discord":{"type":"stdio","command":"python3","args":["/workspace/repo/apps/mcp-servers/discord/server.py"]}}}' \
                    > /tmp/mcp.json

                  git clone https://github.com/kylep/multi.git /workspace/repo
                  cd /workspace/repo

                  if [ -z "$DISCORD_BOT_TOKEN" ]; then echo "MCP preflight FAILED: DISCORD_BOT_TOKEN not set" >&2; exit 1; fi
                  python3 -c "import httpx, mcp.server.fastmcp" || { echo "MCP preflight FAILED: python import error" >&2; exit 1; }
                  echo "MCP preflight OK" >&2

                  claude --agent pai \
                    -p "Post one message to #general: this week's horoscopes. Read the last 15 messages of #general first so you can avoid repeating subjects, sentence shapes, or punchlines from recent weeks. Then write the post.

                  Format exactly:

                  **Weekly Horoscopes — week of <Month D, YYYY>**

                  <@331601077172568064> (Cancer): <one or two sentences>
                  <@293425741406928906> (Scorpio/Sagittarius cusp): <one or two sentences>
                  Lucas (Scorpio): <one or two sentences>
                  Oliver (Taurus): <one or two sentences>

                  Style — read carefully, this is the whole point:
                  - Voice: a normal newspaper horoscope. Plain declarative prose. The *prediction itself* is unhinged or absurdly specific. Think 'you will misplace a pen on Wednesday and locate the truth,' not '[FIELD LOG | EXHIBIT 7-C].'
                  - HARD CAP: two sentences per person. If you write a third, delete it.
                  - No format frame, no themed header line, no '(Format: X)' subtitle, no bracketed stage directions, no ALL-CAPS for emphasis. No em-dash decoration; use one only if grammatically necessary. No emoji.
                  - No astrology jargon in the output — no planets, retrogrades, aspects, charts, alignments, cosmos, universe, stars. The horoscope is the prediction; the sign is just a label.
                  - Kyle: dramatic and conspiratorial in *content*, flat in *tone*. Specific, weird, slightly ominous predictions. No theatrics in the punctuation.
                  - Kara: ONE horoscope that quietly draws on both Scorpio depth and Sagittarius restlessness without ever naming them, mentioning them, or making jokes about being two signs / a paradox / contradictory / having dual energy. Just write her a horoscope. The cusp shapes the texture, never the subject.
                  - Lucas (Scorpio): kid-readable. Silly, specific, slightly mystical predictions. Vary the tone weekly.
                  - Oliver (Taurus): kid-readable. STRICT: do not mention snacks/food/eating/treats unless you have not done so in the last 4 weekly horoscopes you just read. Mix in adventures, animals, weather, weird inventions, school chaos, sports.
                  - Do not @-mention Lucas or Oliver. Do not invent new @-mentions; only the two IDs above.
                  - No web search. The horoscope does not need real planetary data — it needs to be funny and specific." \
                    --mcp-config /tmp/mcp.json \
                    --allowedTools "mcp__pai-discord__send_message,mcp__pai-discord__list_channels,mcp__pai-discord__read_messages" \
                    --verbose \
                    --output-format stream-json
              resources:
                requests:
                  cpu: 1m
                  memory: 256Mi
                limits:
                  cpu: 200m
                  memory: 512Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: workspace
                  mountPath: /workspace
          volumes:
            - name: workspace
              emptyDir: {}
