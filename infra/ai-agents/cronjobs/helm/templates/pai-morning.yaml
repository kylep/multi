apiVersion: batch/v1
kind: CronJob
metadata:
  name: pai-morning
  namespace: ai-agents
spec:
  schedule: {{ .Values.cronjobs.paiMorning.schedule | quote }}
  timeZone: "UTC"
  startingDeadlineSeconds: 3600
  suspend: {{ not .Values.cronjobs.paiMorning.enabled }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 600
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          annotations:
            vault.hashicorp.com/agent-inject: "true"
            vault.hashicorp.com/role: "ai-agents"
            # Pai bot token + Claude OAuth. Also reads discord_guild_id from
            # secret/ai-agents/discord since guild ID is shared across bots.
            vault.hashicorp.com/agent-inject-secret-config: "secret/ai-agents/pai"
            vault.hashicorp.com/agent-inject-template-config: |
              {{`{{- with secret "secret/ai-agents/pai" }}`}}
              export DISCORD_BOT_TOKEN="{{`{{ .Data.data.discord_bot_token }}`}}"
              export CLAUDE_CODE_OAUTH_TOKEN="{{`{{ .Data.data.claude_oauth_token }}`}}"
              export LINEAR_API_KEY="{{`{{ .Data.data.linear_api_key }}`}}"
              {{`{{ end }}`}}
              {{`{{- with secret "secret/ai-agents/discord" }}`}}
              export DISCORD_GUILD_ID="{{`{{ .Data.data.discord_guild_id }}`}}"
              {{`{{ end }}`}}
        spec:
          serviceAccountName: cronjob-agent
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            fsGroup: 1001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: agent
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["/bin/sh", "-c"]
              args:
                - |
                  . /vault/secrets/config

                  # MCP server is named "pai-discord" to match mcp__pai-discord__* tool names.
                  # DISCORD_BOT_TOKEN (from Vault pai secret) is the Pai bot token.
                  printf '%s' '{"mcpServers":{"pai-discord":{"type":"stdio","command":"python3","args":["/workspace/repo/apps/mcp-servers/discord/server.py"]}}}' \
                    > /tmp/mcp.json

                  # Clone public repo so claude can find the pai agent definition.
                  git clone https://github.com/kylep/multi.git /workspace/repo
                  cd /workspace/repo

                  claude --agent pai \
                    -p "Send two messages to #general. Message 1: A creative, fun morning greeting. @mention <@293425741406928906> (penegy/Kara) in the message. Be creative and non-repetitive. Some ideas for inspiration (pick one, or do something entirely different): a short joke or pun, something about today's date (holidays, historical events, fun facts, pop culture references like May 4th = Star Wars day), a tiny poem or haiku, a playful motivational one-liner. Keep it to 1-3 sentences. Cute, warm, fun. No emojis. Message 2: Daily horoscopes. FIRST read the last 10 messages in #general so you can see what you wrote previously and avoid repeating themes, phrases, or jokes. Start with a quick web search about horoscope planetary motions. Horoscopes often mention planets - use web search and do so only if you're confident what you say is correct (about the real physical planet motions). Make them up -- be playful, witty, and specific to the day. IMPORTANT: Always use Discord mention syntax for pings. Kyle is <@331601077172568064>, Kara is <@293425741406928906>. Never substitute names for these IDs. The horoscopes: (1) <@331601077172568064> Cancer (Jul 7): absolutely unhinged -- wildly dramatic, absurdly specific, conspiratorial, and over-the-top. Think doomsday prophet meets fortune cookie meets a caffeinated astrologer who has seen too much. Go full chaos. (2) <@293425741406928906> Sagittarius: a fun horoscope for Kara. (3) <@293425741406928906> Scorpio-Sagittarius Cusp Special: a comical synthesis. Avoid calling the cusp a 'walking contradiction', 'paradox', or 'living contradiction' if you used any of those in the last 10 messages -- find fresh angles. (4) [Lucas] Scorpio: a funny horoscope for a kid. Write it like a real horoscope but make it silly and entertaining -- unexpected predictions, goofy cosmic advice, absurd specificity. Vary the style each day: sometimes dramatic, sometimes deadpan, sometimes conspiratorial, sometimes wholesome. Do NOT @mention anyone. (5) [Oliver] Taurus: funny kid horoscope with varied tone. STRICT RULE: Do NOT mention snacks, food, eating, treats, nuggets, or pastries more than once per week. Check your previous messages. Mix in adventure, animals, weird predictions, school chaos, secret missions, dinosaur facts, space, weather, sports, silly inventions -- whatever fits the day. Do NOT @mention anyone. Keep each horoscope to 2-3 sentences. Make them fun and entertaining, not generic." \
                    --mcp-config /tmp/mcp.json \
                    --allowedTools "WebSearch,WebFetch,mcp__pai-discord__send_message,mcp__pai-discord__list_channels,mcp__pai-discord__read_messages"
              resources:
                requests:
                  cpu: 1m
                  memory: 256Mi
                limits:
                  cpu: 200m
                  memory: 512Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: workspace
                  mountPath: /workspace
          volumes:
            - name: workspace
              emptyDir: {}
