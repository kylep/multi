apiVersion: batch/v1
kind: CronJob
metadata:
  name: autolearn
  namespace: ai-agents
spec:
  schedule: {{ .Values.cronjobs.autolearn.schedule | quote }}
  timeZone: "UTC"
  startingDeadlineSeconds: 3600
  suspend: {{ not .Values.cronjobs.autolearn.enabled }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 3600
      ttlSecondsAfterFinished: 7200
      template:
        metadata:
          annotations:
            vault.hashicorp.com/agent-inject: "true"
            vault.hashicorp.com/role: "ai-agents"
            vault.hashicorp.com/agent-inject-secret-config: "secret/ai-agents/pai"
            vault.hashicorp.com/agent-inject-template-config: |
              {{`{{- with secret "secret/ai-agents/pai" }}`}}
              export DISCORD_BOT_TOKEN="{{`{{ .Data.data.discord_bot_token }}`}}"
              export CLAUDE_CODE_OAUTH_TOKEN="{{`{{ .Data.data.claude_oauth_token }}`}}"
              export LINEAR_API_KEY="{{`{{ .Data.data.linear_api_key }}`}}"
              {{`{{ end }}`}}
              {{`{{- with secret "secret/ai-agents/discord" }}`}}
              export DISCORD_GUILD_ID="{{`{{ .Data.data.discord_guild_id }}`}}"
              export DISCORD_LOG_CHANNEL_ID="{{`{{ .Data.data.discord_log_channel_id }}`}}"
              {{`{{ end }}`}}
              {{`{{- with secret "secret/ai-agents/github" }}`}}
              export GITHUB_APP_ID="{{`{{ .Data.data.github_app_id }}`}}"
              export GITHUB_INSTALL_ID="{{`{{ .Data.data.github_install_id }}`}}"
              {{`{{ end }}`}}
            vault.hashicorp.com/agent-inject-secret-github-key: "secret/ai-agents/github"
            vault.hashicorp.com/agent-inject-template-github-key: |
              {{`{{- with secret "secret/ai-agents/github" -}}{{ .Data.data.github_app_private_key }}{{- end -}}`}}
        spec:
          serviceAccountName: cronjob-agent
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            fsGroup: 1001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: agent
              image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
              imagePullPolicy: {{ $.Values.image.pullPolicy }}
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  . /vault/secrets/config

                  # --- GitHub token ---
                  gen_token() {
                    _header=$(printf '{"alg":"RS256","typ":"JWT"}' \
                      | openssl base64 -e -A | tr '+/' '-_' | tr -d '=')
                    _now=$(date +%s); _iat=$((_now - 60)); _exp=$((_now + 300))
                    _payload=$(printf '{"iss":"%s","iat":%d,"exp":%d}' \
                      "$GITHUB_APP_ID" "$_iat" "$_exp" \
                      | openssl base64 -e -A | tr '+/' '-_' | tr -d '=')
                    _sig=$(printf '%s.%s' "$_header" "$_payload" \
                      | openssl dgst -sha256 -sign /vault/secrets/github-key -binary \
                      | openssl base64 -e -A | tr '+/' '-_' | tr -d '=')
                    curl -sf -X POST \
                      -H "Authorization: Bearer ${_header}.${_payload}.${_sig}" \
                      -H "Accept: application/vnd.github+json" \
                      "https://api.github.com/app/installations/${GITHUB_INSTALL_ID}/access_tokens" \
                      | jq -r '.token'
                  }
                  GITHUB_TOKEN=$(gen_token)

                  RUN_ID=$(cat /proc/sys/kernel/random/uuid | tr -d '-' | cut -c1-8)
                  AGENT_NAME="autolearn"

                  discord_post() {
                    curl -sf -X POST \
                      "https://discord.com/api/v10/channels/${DISCORD_LOG_CHANNEL_ID}/messages" \
                      -H "Authorization: Bot ${DISCORD_BOT_TOKEN}" \
                      -H "Content-Type: application/json" \
                      -d "{\"content\":\"$1\"}" || true
                  }

                  # --- Query Linear for autolearn issues ---
                  # Find issues with label "autolearn" in "Todo" status.
                  ISSUE_JSON=$(curl -sf -X POST \
                    -H "Authorization: ${LINEAR_API_KEY}" \
                    -H "Content-Type: application/json" \
                    "https://api.linear.app/graphql" \
                    -d '{"query":"{ issues(filter: { labels: { name: { eq: \"autolearn\" } }, state: { name: { in: [\"Todo\", \"Backlog\"] } } }, first: 1, orderBy: createdAt) { nodes { id identifier title description } } }"}')

                  ISSUE_ID=$(echo "$ISSUE_JSON" | jq -r '.data.issues.nodes[0].identifier // empty')
                  ISSUE_TITLE=$(echo "$ISSUE_JSON" | jq -r '.data.issues.nodes[0].title // empty')
                  ISSUE_UUID=$(echo "$ISSUE_JSON" | jq -r '.data.issues.nodes[0].id // empty')

                  if [ -z "$ISSUE_ID" ]; then
                    echo "No autolearn issues found in Todo/Backlog. Exiting."
                    exit 0
                  fi

                  echo "Found issue: ${ISSUE_ID} - ${ISSUE_TITLE}"
                  discord_post "▶ ${RUN_ID} | agent=${AGENT_NAME} | issue=${ISSUE_ID} | ${ISSUE_TITLE}"

                  # --- Derive branch and slug ---
                  SLUG=$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -cd 'a-z0-9-' | cut -c1-50)
                  BRANCH="autolearn/${ISSUE_ID}-${SLUG}"

                  # --- Clone and set up branch ---
                  git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/kylep/multi.git" /workspace/repo
                  cd /workspace/repo
                  git config user.name "PericakAI (Pai)"
                  git config user.email "pericakai@gmail.com"

                  if git ls-remote --exit-code --heads origin "${BRANCH}" >/dev/null 2>&1; then
                    git fetch origin "${BRANCH}"
                    git checkout "${BRANCH}"
                    git merge origin/main --no-edit || true
                  else
                    git checkout -b "${BRANCH}"
                  fi

                  # --- MCP config (discord + linear) ---
                  cat > /tmp/mcp.json <<'MCPEOF'
                  {
                    "mcpServers": {
                      "discord": {
                        "type": "stdio",
                        "command": "python3",
                        "args": ["/workspace/repo/apps/mcp-servers/discord/server.py"]
                      },
                      "linear-server": {
                        "type": "stdio",
                        "command": "npx",
                        "args": ["-y", "@hatcloud/linear-mcp"]
                      }
                    }
                  }
                  MCPEOF

                  # --- Run autolearn agent ---
                  claude --agent autolearn \
                    -p "Investigate the tool described in Linear issue ${ISSUE_ID}: ${ISSUE_TITLE}. Issue description: $(echo "$ISSUE_JSON" | jq -r '.data.issues.nodes[0].description // "No description provided."'). The Linear issue UUID is ${ISSUE_UUID}. Run the full autolearn pipeline: claim the issue, scope it, execute the PoC, evaluate against the stack, write the wiki page, and report results." \
                    --mcp-config /tmp/mcp.json \
                    --max-turns 100 \
                    --allowedTools "Read,Write,Edit,Glob,Grep,WebSearch,WebFetch,Agent,Bash(*),mcp__linear-server__list_issues,mcp__linear-server__save_issue,mcp__linear-server__get_issue,mcp__linear-server__list_comments,mcp__linear-server__save_comment,mcp__linear-server__list_issue_statuses,mcp__linear-server__list_issue_labels,mcp__linear-server__list_teams,mcp__discord__send_message,mcp__discord__list_channels,mcp__discord__read_messages" \
                    --verbose \
                    --output-format stream-json
                  STATUS=$?

                  if [ $STATUS -eq 0 ]; then
                    GITHUB_TOKEN=$(gen_token)
                    git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/kylep/multi.git"
                    git push origin "${BRANCH}" || git push --force-with-lease origin "${BRANCH}"

                    EXISTING_PR=$(curl -sf \
                      -H "Authorization: token ${GITHUB_TOKEN}" \
                      -H "Accept: application/vnd.github+json" \
                      "https://api.github.com/repos/kylep/multi/pulls?head=kylep:${BRANCH}&state=open" \
                      | jq 'length')
                    if [ "${EXISTING_PR}" = "0" ]; then
                      curl -sf -X POST \
                        -H "Authorization: token ${GITHUB_TOKEN}" \
                        -H "Accept: application/vnd.github+json" \
                        "https://api.github.com/repos/kylep/multi/pulls" \
                        -d "{\"title\":\"autolearn: ${ISSUE_ID} ${ISSUE_TITLE}\",\"body\":\"Automated tool evaluation from autolearn pipeline.\\n\\nLinear: ${ISSUE_ID}\",\"head\":\"${BRANCH}\",\"base\":\"main\"}" || true
                    fi
                    MSG="✓ ${RUN_ID} | agent=${AGENT_NAME} | issue=${ISSUE_ID} | done"
                  else
                    MSG="✗ ${RUN_ID} | agent=${AGENT_NAME} | issue=${ISSUE_ID} | failed (exit ${STATUS})"
                  fi
                  discord_post "${MSG}"
                  exit $STATUS
              resources:
                requests:
                  cpu: 100m
                  memory: 512Mi
                limits:
                  cpu: 1000m
                  memory: 2Gi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: workspace
                  mountPath: /workspace
          volumes:
            - name: workspace
              emptyDir:
                sizeLimit: 5Gi
