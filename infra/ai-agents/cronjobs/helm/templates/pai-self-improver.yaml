apiVersion: batch/v1
kind: CronJob
metadata:
  name: pai-self-improver
  namespace: ai-agents
spec:
  schedule: {{ .Values.cronjobs.paiSelfImprover.schedule | quote }}
  timeZone: "UTC"
  startingDeadlineSeconds: 86400
  suspend: {{ not .Values.cronjobs.paiSelfImprover.enabled }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 900
      ttlSecondsAfterFinished: 7200
      template:
        metadata:
          annotations:
            vault.hashicorp.com/agent-inject: "true"
            vault.hashicorp.com/role: "ai-agents"
            vault.hashicorp.com/agent-inject-secret-config: "secret/ai-agents/pai"
            vault.hashicorp.com/agent-inject-template-config: |
              {{`{{- with secret "secret/ai-agents/pai" }}`}}
              export DISCORD_BOT_TOKEN="{{`{{ .Data.data.discord_bot_token }}`}}"
              export CLAUDE_CODE_OAUTH_TOKEN="{{`{{ .Data.data.claude_oauth_token }}`}}"
              export LINEAR_API_KEY="{{`{{ .Data.data.linear_api_key }}`}}"
              {{`{{ end }}`}}
              {{`{{- with secret "secret/ai-agents/discord" }}`}}
              export DISCORD_GUILD_ID="{{`{{ .Data.data.discord_guild_id }}`}}"
              export DISCORD_LOG_CHANNEL_ID="{{`{{ .Data.data.discord_log_channel_id }}`}}"
              {{`{{ end }}`}}
              {{`{{- with secret "secret/ai-agents/openobserve" }}`}}
              export O2_USER="{{`{{ .Data.data.root_user_email }}`}}"
              export O2_PASS="{{`{{ .Data.data.root_user_password }}`}}"
              {{`{{ end }}`}}
        spec:
          serviceAccountName: cronjob-agent
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            fsGroup: 1001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: agent
              image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
              imagePullPolicy: {{ $.Values.image.pullPolicy }}
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  . /vault/secrets/config

                  # OpenObserve MCP expects a base64-encoded user:pass token.
                  export O2_TOKEN=$(printf '%s:%s' "$O2_USER" "$O2_PASS" | base64 | tr -d '\n')
                  export O2_URL="http://openobserve-openobserve-standalone.openobserve.svc.cluster.local:5080/obs"
                  export O2_ORG="default"

                  RUN_ID=$(cat /proc/sys/kernel/random/uuid | tr -d '-' | cut -c1-8)
                  AGENT_NAME="pai-self-improver"

                  discord_post() {
                    curl -sf -X POST \
                      "https://discord.com/api/v10/channels/${DISCORD_LOG_CHANNEL_ID}/messages" \
                      -H "Authorization: Bot ${DISCORD_BOT_TOKEN}" \
                      -H "Content-Type: application/json" \
                      -d "{\"content\":\"$1\"}" || true
                  }

                  # Anonymous read-only clone — repo is public, no GH App needed.
                  git clone --depth 1 https://github.com/kylep/multi.git /workspace/repo
                  cd /workspace/repo

                  # MCP config: openobserve (for log queries), pai-discord (for
                  # Discord post), linear-server (for filing the proposal issue).
                  cat > /tmp/mcp.json <<MCPEOF
                  {
                    "mcpServers": {
                      "openobserve": {
                        "type": "stdio",
                        "command": "python3",
                        "args": ["/workspace/repo/apps/mcp-servers/openobserve/server.py"],
                        "env": {
                          "O2_URL": "${O2_URL}",
                          "O2_ORG": "${O2_ORG}",
                          "O2_TOKEN": "${O2_TOKEN}"
                        }
                      },
                      "pai-discord": {
                        "type": "stdio",
                        "command": "python3",
                        "args": ["/workspace/repo/apps/mcp-servers/discord/server.py"],
                        "env": {
                          "DISCORD_BOT_TOKEN": "${DISCORD_BOT_TOKEN}",
                          "DISCORD_GUILD_ID": "${DISCORD_GUILD_ID}"
                        }
                      },
                      "linear-server": {
                        "type": "stdio",
                        "command": "npx",
                        "args": ["-y", "@hatcloud/linear-mcp"],
                        "env": {
                          "LINEAR_API_KEY": "${LINEAR_API_KEY}"
                        }
                      }
                    }
                  }
                  MCPEOF

                  # Pre-flight: verify env + python deps. Fail fast if missing.
                  if [ -z "$DISCORD_BOT_TOKEN" ]; then echo "MCP preflight FAILED: DISCORD_BOT_TOKEN" >&2; exit 1; fi
                  if [ -z "$O2_TOKEN" ]; then echo "MCP preflight FAILED: O2_TOKEN" >&2; exit 1; fi
                  python3 -c "import httpx, mcp.server.fastmcp" || { echo "MCP preflight FAILED: python imports" >&2; exit 1; }
                  echo "MCP preflight OK" >&2

                  discord_post "▶ ${RUN_ID} | agent=${AGENT_NAME} | started"

                  claude --agent pai-self-improver \
                    -p "Run the daily self-improvement scan. Look at the last 24 hours of logs in OpenObserve, find recurring failures with 3+ occurrences, and post one Linear issue plus one Discord summary if anything crosses the threshold. If nothing crosses the threshold, exit silently." \
                    --mcp-config /tmp/mcp.json \
                    --strict-mcp-config \
                    --allowedTools "Read,Glob,Grep,Bash(date *),Bash(ls *),Bash(cat *),mcp__openobserve__*,mcp__pai-discord__send_message,mcp__pai-discord__list_channels,mcp__linear-server__list_issues,mcp__linear-server__save_issue,mcp__linear-server__get_issue,mcp__linear-server__list_comments,mcp__linear-server__save_comment,mcp__linear-server__list_issue_statuses,mcp__linear-server__list_issue_labels,mcp__linear-server__list_teams" \
                    --disable-slash-commands \
                    --output-format text
                  STATUS=$?

                  if [ $STATUS -eq 0 ]; then
                    discord_post "✓ ${RUN_ID} | agent=${AGENT_NAME} | done"
                  else
                    discord_post "✗ ${RUN_ID} | agent=${AGENT_NAME} | failed (exit ${STATUS})"
                  fi
                  exit $STATUS
              resources:
                requests:
                  cpu: 1m
                  memory: 384Mi
                limits:
                  cpu: 200m
                  memory: 512Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: workspace
                  mountPath: /workspace
          volumes:
            - name: workspace
              emptyDir: {}
