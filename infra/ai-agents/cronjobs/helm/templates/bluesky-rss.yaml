{{- if .Values.cronjobs.blueskyRss }}
{{- if .Values.cronjobs.blueskyRss.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bluesky-rss-state
  namespace: ai-agents
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Mi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: bluesky-rss
  namespace: ai-agents
spec:
  schedule: {{ .Values.cronjobs.blueskyRss.schedule | quote }}
  timeZone: "UTC"
  startingDeadlineSeconds: 900
  suspend: false
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 120
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          annotations:
            vault.hashicorp.com/agent-inject: "true"
            vault.hashicorp.com/role: "ai-agents"
            vault.hashicorp.com/agent-inject-secret-config: "secret/ai-agents/bluesky"
            vault.hashicorp.com/agent-inject-template-config: |
              {{`{{- with secret "secret/ai-agents/bluesky" -}}`}}
              export BLUESKY_HANDLE="{{`{{ .Data.data.handle }}`}}"
              export BLUESKY_APP_PASSWORD="{{`{{ .Data.data.app_password }}`}}"
              {{`{{- end -}}`}}
        spec:
          serviceAccountName: cronjob-agent
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            fsGroup: 1001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: bluesky-rss
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["/bin/sh", "-c"]
              args:
                - |
                  . /vault/secrets/config
                  git clone --depth 1 https://github.com/kylep/multi.git /workspace/repo 2>/dev/null
                  python3 /workspace/repo/infra/ai-agents/cronjobs/scripts/bluesky-rss.py
              resources:
                requests:
                  cpu: 1m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: cache
                  mountPath: /cache
                - name: workspace
                  mountPath: /workspace
          volumes:
            - name: cache
              persistentVolumeClaim:
                claimName: bluesky-rss-state
            - name: workspace
              emptyDir: {}
{{- end }}
{{- end }}
