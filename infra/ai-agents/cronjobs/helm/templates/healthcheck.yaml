apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: healthcheck-state
  namespace: ai-agents
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Mi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: healthcheck
  namespace: ai-agents
spec:
  schedule: {{ .Values.cronjobs.healthcheck.schedule | quote }}
  timeZone: "UTC"
  startingDeadlineSeconds: 3600
  suspend: {{ not .Values.cronjobs.healthcheck.enabled }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 120
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          annotations:
            vault.hashicorp.com/agent-inject: "true"
            vault.hashicorp.com/role: "ai-agents"
            vault.hashicorp.com/agent-inject-secret-config: "secret/ai-agents/discord"
            vault.hashicorp.com/agent-inject-template-config: |
              {{`{{- with secret "secret/ai-agents/discord" -}}`}}
              export DISCORD_BOT_TOKEN="{{`{{ .Data.data.discord_bot_token }}`}}"
              export DISCORD_LOG_CHANNEL_ID="{{`{{ .Data.data.discord_log_channel_id }}`}}"
              {{`{{- end -}}`}}
        spec:
          serviceAccountName: cronjob-agent
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            fsGroup: 1001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: healthcheck
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["/bin/sh", "-c"]
              args:
                - |
                  . /vault/secrets/config

                  DISCORD_CHANNEL="${DISCORD_LOG_CHANNEL_ID:-1484017412306239578}"
                  STATE_FILE="/cache/last-state"

                  check_pods() {
                    BAD=$(kubectl get pods -A --no-headers 2>/dev/null \
                      | grep -v -E 'Running|Completed' \
                      | grep -v -E '\bdebug\b' || true)
                    if [ -n "$BAD" ]; then
                      DETAIL=$(echo "$BAD" | head -3 | awk '{print $1"/"$2":"$4}' | tr '\n' ' ')
                      echo "FAIL:${DETAIL}"
                    else
                      echo "OK"
                    fi
                  }

                  check_argocd() {
                    BAD=$(kubectl get applications -n argocd --no-headers 2>/dev/null \
                      | grep -v -E 'Synced\s+(Healthy|Progressing)' || true)
                    if [ -n "$BAD" ]; then
                      DETAIL=$(echo "$BAD" | awk '{print $1":"$2"/"$3}' | tr '\n' ' ')
                      echo "FAIL:${DETAIL}"
                    else
                      echo "OK"
                    fi
                  }

                  check_vault() {
                    HEALTH=$(curl -sf --connect-timeout 5 http://vault.vault.svc.cluster.local:8200/v1/sys/health 2>/dev/null) || {
                      echo "FAIL:unreachable"; return
                    }
                    SEALED=$(echo "$HEALTH" | jq -r '.sealed' 2>/dev/null)
                    if [ "$SEALED" = "true" ]; then
                      echo "FAIL:sealed"
                    else
                      echo "OK"
                    fi
                  }

                  check_cronjobs() {
                    FAILED=$(kubectl get jobs -n ai-agents --no-headers 2>/dev/null \
                      | grep -v -E 'debug|manual|test|-v[0-9]|healthcheck-' \
                      | grep '0/1' \
                      | awk '{print $1}' || true)
                    if [ -n "$FAILED" ]; then
                      DETAIL=$(echo "$FAILED" | head -3 | tr '\n' ' ')
                      echo "FAIL:${DETAIL}"
                    else
                      echo "OK"
                    fi
                  }

                  R_PODS=$(check_pods)
                  R_ARGO=$(check_argocd)
                  R_VAULT=$(check_vault)
                  R_CRON=$(check_cronjobs)
                  CURRENT="pods=${R_PODS};argo=${R_ARGO};vault=${R_VAULT};cron=${R_CRON}"
                  echo "Current: $CURRENT"

                  PREV=""
                  if [ -f "$STATE_FILE" ]; then
                    PREV=$(cat "$STATE_FILE")
                    echo "Previous: $PREV"
                  fi
                  echo "$CURRENT" > "$STATE_FILE" 2>/dev/null || true

                  if [ "$CURRENT" = "$PREV" ]; then
                    echo "No state change."
                    exit 0
                  fi

                  get_status() {
                    echo "$1" | tr ';' '\n' | grep "^$2=" | sed "s/^$2=//" | cut -d: -f1
                  }
                  get_detail() {
                    echo "$1" | tr ';' '\n' | grep "^$2=" | sed "s/^$2=[^:]*://"
                  }

                  MSG="Health check — $(date -u '+%Y-%m-%d %H:%M UTC')"
                  HAS_CHANGES=false
                  for CHECK in pods argo vault cron; do
                    CUR_S=$(get_status "$CURRENT" "$CHECK")
                    PREV_S=$(get_status "$PREV" "$CHECK")
                    DETAIL=$(get_detail "$CURRENT" "$CHECK")
                    if [ "$CUR_S" != "$PREV_S" ] || [ -z "$PREV" ]; then
                      HAS_CHANGES=true
                      if [ "$CUR_S" = "FAIL" ]; then
                        MSG="${MSG}
                  🔴 ${CHECK}: ${DETAIL}"
                      else
                        MSG="${MSG}
                  🟢 ${CHECK} recovered"
                      fi
                    fi
                  done

                  if [ "$HAS_CHANGES" = false ]; then
                    echo "No state change."
                    exit 0
                  fi

                  echo "$MSG"
                  if [ -n "$DISCORD_BOT_TOKEN" ]; then
                    PAYLOAD=$(jq -n --arg content "$MSG" '{content: $content}')
                    curl -sf -X POST \
                      "https://discord.com/api/v10/channels/${DISCORD_CHANNEL}/messages" \
                      -H "Authorization: Bot ${DISCORD_BOT_TOKEN}" \
                      -H "Content-Type: application/json" \
                      -d "$PAYLOAD" > /dev/null || echo "Discord post failed"
                  fi
              resources:
                requests:
                  cpu: 1m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: cache
                  mountPath: /cache
          volumes:
            - name: cache
              persistentVolumeClaim:
                claimName: healthcheck-state
