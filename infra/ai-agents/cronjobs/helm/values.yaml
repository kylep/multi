# Defaults — all CronJobs suspended. Override per cluster in environments/<name>.yaml.
cronjobs:
  journalist:
    morning:
      enabled: false
      schedule: "0 10 * * *"   # 6:00 AM EDT / 10:00 UTC
    noon:
      enabled: false
      schedule: "0 16 * * *"   # 12:00 PM EDT / 16:00 UTC
    evening:
      enabled: false
      schedule: "0 22 * * *"   # 6:00 PM EDT / 22:00 UTC
  paiMorning:
    enabled: false
    schedule: "30 12 * * *"

image:
  repository: kpericak/ai-agent-runtime
  tag: "0.4"
  pullPolicy: Always

repo:
  url: "https://github.com/kylep/multi.git"
  branch: main
