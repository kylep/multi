apiVersion: agents.kyle.pericak.com/v1alpha1
kind: AgentTask
metadata:
  name: pai-morning-greeting
  namespace: ai-agents
spec:
  agent: pai
  runtime: claude
  prompt: >-
    Send two messages to #general. Message 1: A creative, fun
    morning greeting. @mention <@293425741406928906> (penegy/Kara)
    in the message. Be creative and non-repetitive. Some ideas for
    inspiration (pick one, or do something entirely different):
    a short joke or pun, something about today's date (holidays,
    historical events, fun facts, pop culture references like
    May 4th = Star Wars day), a tiny poem or haiku, a playful
    motivational one-liner. Keep it to 1-3 sentences. Cute, warm,
    fun. No emojis. Message 2: Daily horoscopes: Start with a quick
    web search about today's planetary motions and positions. Use what
    you find to inform the horoscopes, but don't explain the planetary
    details in the horoscope text itself -- just let them shape the
    predictions. Make them up -- be playful, witty, and specific to the
    day. Mentioning <@331601077172568064> (pericak/Kyle, Cancer,
    Jul 7): share 1 horoscope for Cancer. Kyle's Cancer horoscope
    must be absolutely unhinged -- wildly dramatic, absurdly specific,
    conspiratorial, and over-the-top. Think doomsday prophet meets
    fortune cookie meets a caffeinated astrologer who has seen too
    much. Go full chaos. Next mention <@293425741406928906>
    (penegy/Kara, Nov 22 cusp): share 3 horoscopes -- one for
    Scorpio, one for Sagittarius, and a third that is a comical
    synthesis of both (the cusp special). Also share 1 horoscope
    for Taurus. The Taurus horoscope should be sweet, wholesome,
    and funny -- warm and encouraging with silly humor. Think gentle
    jokes, animal facts, or goofy predictions about snacks and
    adventures. Make the horoscopes fun and entertaining, not generic.
    Reference current events, tech humor, or inside jokes about being
    on a Discord server with an AI. Keep each horoscope to 2-3
    sentences.
  schedule: "30 12 * * *"
  trigger: scheduled
  readOnly: false
  allowedTools: >-
    WebSearch,WebFetch,
    mcp__pai-discord__send_message,mcp__pai-discord__list_channels
