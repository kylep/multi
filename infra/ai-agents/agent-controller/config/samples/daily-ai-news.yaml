apiVersion: agents.kyle.pericak.com/v1alpha1
kind: AgentTask
metadata:
  name: daily-ai-news
  namespace: ai-agents
spec:
  agent: journalist
  runtime: claude
  prompt: >-
    Search for yesterday's most notable news across AI, open source,
    security, geopolitics, and local topics. First read your last 5
    posts from #news using read_messages to avoid repeating stories
    and calibrate tone. Write a digest to
    apps/blog/blog/markdown/wiki/journal/YYYY-MM-DD/daily-digest.md
    with proper wiki frontmatter. Then post a summary to Discord #news
    using the format defined in your agent instructions. Apply the
    significance rubric strictly — if fewer than 2 stories qualify,
    write a one-line wiki entry and skip Discord.
  schedule: "52 22 * * *"
  trigger: scheduled
  readOnly: false
  allowedTools: >-
    WebSearch,WebFetch,Read,Glob,Grep,Write,
    Bash(mkdir -p apps/blog/blog/markdown/wiki/journal/*),
    Bash(date *),
    mcp__discord__send_message,mcp__discord__list_channels,mcp__discord__read_messages,
    mcp__google-news__search_news,mcp__google-news__top_headlines
