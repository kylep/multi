apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-controller
  namespace: ai-agents
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-controller
  namespace: ai-agents
rules:
  - apiGroups: ["agents.kyle.pericak.com"]
    resources: ["agenttasks"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["agents.kyle.pericak.com"]
    resources: ["agenttasks/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-controller
  namespace: ai-agents
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: agent-controller
subjects:
  - kind: ServiceAccount
    name: agent-controller
    namespace: ai-agents
