apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agenttasks.agents.kyle.pericak.com
spec:
  group: agents.kyle.pericak.com
  names:
    kind: AgentTask
    listKind: AgentTaskList
    plural: agenttasks
    singular: agenttask
    shortNames:
      - at
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - agent
                - prompt
              properties:
                agent:
                  type: string
                  description: "Agent name: publisher, analyst, researcher, etc."
                runtime:
                  type: string
                  enum: ["claude", "opencode"]
                  default: "claude"
                  description: "CLI runtime to use."
                prompt:
                  type: string
                  description: "The -p argument passed to the agent CLI."
                schedule:
                  type: string
                  description: "Cron expression. Empty means one-shot."
                trigger:
                  type: string
                  enum: ["manual", "scheduled", "webhook"]
                  default: "manual"
                  description: "How this task is triggered."
                readOnly:
                  type: boolean
                  default: false
                  description: "Whether this agent only reads the repo."
                branch:
                  type: string
                  description: "Git branch to clone. Defaults to main if omitted."
                allowedTools:
                  type: string
                  description: "Comma-separated --allowedTools for Claude Code permissions."
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: ["Pending", "Running", "Succeeded", "Failed"]
                lastRunTime:
                  type: string
                  format: date-time
                jobName:
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Agent
          type: string
          jsonPath: .spec.agent
        - name: Trigger
          type: string
          jsonPath: .spec.trigger
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Last Run
          type: date
          jsonPath: .status.lastRunTime
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
