apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-controller.fullname" . }}
  labels:
    {{- include "agent-controller.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "agent-controller.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agent-controller.selectorLabels" . | nindent 8 }}
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "ai-agents"
        vault.hashicorp.com/agent-inject-secret-config: "secret/ai-agents/discord"
        vault.hashicorp.com/agent-inject-template-config: |
          {{`{{- with secret "secret/ai-agents/discord" -}}
          export DISCORD_BOT_TOKEN="{{ .Data.data.discord_bot_token }}"
          export DISCORD_LOG_CHANNEL_ID="{{ .Data.data.discord_log_channel_id }}"
          {{- end }}
          {{- with secret "secret/ai-agents/webhook" -}}
          export AI_WEBHOOK_TOKEN="{{ .Data.data.webhook_token }}"
          {{- end }}
          {{- with secret "secret/ai-agents/github" -}}
          export GITHUB_APP_ID="{{ .Data.data.github_app_id }}"
          export GITHUB_APP_PRIVATE_KEY="{{ .Data.data.github_app_private_key }}"
          export GITHUB_INSTALL_ID="{{ .Data.data.github_install_id }}"
          {{- end }}`}}
    spec:
      serviceAccountName: {{ include "agent-controller.fullname" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: "{{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag }}"
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command: ["sh", "-c"]
          args: [". /vault/secrets/config && exec /usr/local/bin/agent-controller"]
          env:
            - name: NAMESPACE
              value: {{ .Values.namespace }}
            - name: RUNTIME_IMAGE
              value: "{{ .Values.runtime.image.repository }}:{{ .Values.runtime.image.tag }}"
            - name: BRANCH_HOSTPATH_BASE
              value: {{ .Values.storage.branchHostPathBase | default "/tmp/agent-workspace/branches" | quote }}
            - name: BRANCH_PVC_SIZE
              value: {{ .Values.storage.branchSize | default "5Gi" | quote }}
          ports:
            - name: webhook
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: webhook
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: webhook
            initialDelaySeconds: 5
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
