---
# Exposes ArgoCD UI at pai.pericak.com/argocd via Traefik IngressRoute.
# Requires Traefik CRDs installed (from the traefik Helm release).
# ArgoCD must be configured with server.rootpath: /argocd for the UI to work.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: argocd-strip-prefix
  namespace: argocd
spec:
  stripPrefix:
    prefixes:
      - /argocd
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`pai.pericak.com`) && PathPrefix(`/argocd`)
      kind: Rule
      middlewares:
        - name: argocd-strip-prefix
      services:
        - name: argocd-server
          port: 80
