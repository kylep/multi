---
# Exposes ArgoCD at http://localhost/argocd for local access (no Cloudflare).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-local
  namespace: argocd
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`localhost`) && PathPrefix(`/argocd`)
      kind: Rule
      services:
        - name: argocd-server
          port: 80
