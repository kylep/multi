apiVersion: apps/v1
kind: Deployment
metadata:
  name: pai-responder
  namespace: ai-agents
  labels:
    app: pai-responder
spec:
  replicas: 1
  strategy:
    type: Recreate  # Only one poller at a time
  selector:
    matchLabels:
      app: pai-responder
  template:
    metadata:
      labels:
        app: pai-responder
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "ai-agents"
        vault.hashicorp.com/agent-inject-secret-config: "secret/ai-agents/pai"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/ai-agents/pai" -}}
          export CLAUDE_CODE_OAUTH_TOKEN="{{ .Data.data.claude_oauth_token }}"
          export PAI_DISCORD_BOT_TOKEN="{{ .Data.data.discord_bot_token }}"
          {{- end }}
    spec:
      serviceAccountName: ai-agents
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: pai-responder
          image: kpericak/ai-agent-runtime:0.4
          command: ["/bin/sh", "-c"]
          args:
            - |
              . /vault/secrets/config
              exec python3 /opt/pai/poll-loop.py
          env:
            - name: DISCORD_GUILD_ID
              value: "1482815068352675971"
            - name: POLL_INTERVAL
              value: "30"
            - name: REVIEW_INTERVAL
              value: "900"
            - name: STATE_PATH
              value: "/data/state.json"
          volumeMounts:
            - name: pai-state
              mountPath: /data
            - name: pai-script
              mountPath: /opt/pai
            - name: discord-mcp
              mountPath: /opt/discord-mcp
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: pai-state
          persistentVolumeClaim:
            claimName: pai-state
        - name: pai-script
          configMap:
            name: pai-responder-script
        - name: discord-mcp
          configMap:
            name: pai-discord-mcp
