apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ai-agents

resources:
  - pvc.yaml
  - deployment.yaml

configMapGenerator:
  - name: pai-responder-script
    files:
      - poll-loop.py=../poll-loop.py

  # Discord MCP server.py mounted for Claude to use as MCP subprocess
  - name: pai-discord-mcp
    files:
      - server.py=../../../apps/mcp-servers/discord/server.py

generatorOptions:
  disableNameSuffixHash: true
