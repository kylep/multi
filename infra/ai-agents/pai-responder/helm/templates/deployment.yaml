{{- if .Values.paiResponder.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pai-responder.fullname" . }}
  labels:
    {{- include "pai-responder.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "pai-responder.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pai-responder.selectorLabels" . | nindent 8 }}
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: {{ .Values.vault.role | quote }}
        vault.hashicorp.com/agent-inject-secret-config: {{ .Values.vault.secretPath | quote }}
        vault.hashicorp.com/agent-inject-template-config: |
          {{`{{- with secret `}}"{{ .Values.vault.secretPath }}"{{` -}}`}}
          export CLAUDE_CODE_OAUTH_TOKEN="{{`{{ .Data.data.claude_oauth_token }}`}}"
          export PAI_DISCORD_BOT_TOKEN="{{`{{ .Data.data.discord_bot_token }}`}}"
          export LINEAR_API_KEY="{{`{{ .Data.data.linear_api_key }}`}}"
          {{`{{- end }}`}}
    spec:
      serviceAccountName: cronjob-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: clone-repo
          image: alpine/git:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              git clone --depth 1 --branch {{ .Values.repo.branch }} \
                {{ .Values.repo.url }} /workspace/repo
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: workspace
              mountPath: /workspace
        - name: migrate-memory
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              python3 /opt/pai/migrate.py
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: pai-state
              mountPath: /data
            - name: pai-script
              mountPath: /opt/pai/migrate.py
              subPath: migrate.py
            - name: pai-script
              mountPath: /opt/pai/memory_mcp.py
              subPath: memory_mcp.py
      containers:
        - name: pai-responder
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          workingDir: /workspace/repo
          command: ["/bin/sh", "-c"]
          args:
            - |
              . /vault/secrets/config
              export PYTHONPATH=/opt/pai
              python3 /opt/pai/gateway.py
          env:
            - name: DISCORD_GUILD_ID
              value: {{ .Values.discord.guildId | quote }}
            - name: REVIEW_INTERVAL
              value: {{ .Values.gateway.reviewInterval | quote }}
            - name: REVIEW_ENABLED
              value: {{ .Values.gateway.reviewEnabled | quote }}
            - name: IDLE_TIMEOUT
              value: {{ .Values.gateway.idleTimeout | quote }}
            - name: MAX_THREAD_AGE
              value: {{ .Values.gateway.maxThreadAge | quote }}
            - name: STATE_PATH
              value: /data/state.json
            - name: HEALTH_PORT
              value: "8080"
            - name: MEMORY_DATA_DIR
              value: /data
            # Suppress claude CLI's launch-time network roundtrips
            # (autoupdate, telemetry, error reporting, feedback survey).
            # Cuts each subprocess cold-start by 2-5s.
            - name: CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC
              value: "1"
            # Don't synchronously block claude startup on MCP servers —
            # tools load lazily / in parallel with the first model call.
            # Saves ~3.5s on the main-pai path (measured 2026-05-09).
            - name: MCP_CONNECTION_NONBLOCKING
              value: "1"
            # Lift the per-startup concurrency cap so all 4 of Pai's MCP
            # servers come up in parallel (default 3 forced playwright
            # to wait for pai-discord to finish before slotting in).
            - name: MCP_SERVER_CONNECTION_BATCH_SIZE
              value: "10"
          ports:
            - name: health
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: pai-state
              mountPath: /data
            - name: pai-script
              mountPath: /opt/pai/gateway.py
              subPath: gateway.py
            - name: pai-script
              mountPath: /opt/pai/transcript.py
              subPath: transcript.py
            - name: pai-script
              mountPath: /opt/pai/thread_manager.py
              subPath: thread_manager.py
            - name: pai-script
              mountPath: /opt/pai/memory_mcp.py
              subPath: memory_mcp.py
            - name: pai-script
              mountPath: /opt/pai/migrate.py
              subPath: migrate.py
            - name: pai-script
              mountPath: /opt/discord-mcp/server.py
              subPath: discord-mcp-server.py
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: workspace
          emptyDir: {}
        - name: pai-state
          persistentVolumeClaim:
            claimName: {{ include "pai-responder.fullname" . }}-state
        - name: pai-script
          configMap:
            name: {{ include "pai-responder.fullname" . }}-script
{{- end }}
