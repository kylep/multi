repositories:
  - name: hashicorp
    url: https://helm.releases.hashicorp.com

# Environments map to per-cluster values files. Use: helmfile -e m1 apply
# ArgoCD uses these same files for ongoing GitOps sync (see argocd/).
environments:
  default:
    values:
      - environments/default.yaml
  m1:
    values:
      - environments/m1.yaml
  m2:
    values:
      - environments/m2.yaml

releases:
  - name: vault
    namespace: vault
    chart: hashicorp/vault
    version: 0.32.0
    values:
      - vault/values.yaml
    createNamespace: true

  - name: agent-controller
    namespace: ai-agents
    chart: ./agent-controller/helm
    needs:
      - vault/vault

  - name: pai-responder
    namespace: ai-agents
    chart: ./pai-responder/helm
    condition: enabled
    needs:
      - vault/vault

  - name: agent-tasks
    namespace: ai-agents
    chart: ./agent-tasks/helm
    needs:
      - ai-agents/agent-controller
