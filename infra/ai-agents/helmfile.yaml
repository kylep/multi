repositories:
  - name: hashicorp
    url: https://helm.releases.hashicorp.com
  - name: argo
    url: https://argoproj.github.io/argo-helm

# Environments map to per-cluster values files. Use: helmfile -e pai-m1 apply
# ArgoCD uses these same files for ongoing GitOps sync (see argocd/).
environments:
  default:
    values:
      - environments/default.yaml
  pai-m1:
    values:
      - environments/pai-m1.yaml
  kyle-m2:
    values:
      - environments/kyle-m2.yaml
---
releases:
  - name: argocd
    namespace: argocd
    chart: argo/argo-cd
    version: 9.4.15
    condition: argocd.enabled
    createNamespace: true
    set:
      - name: configs.params.server\.insecure
        value: "true"
      - name: configs.params.server\.rootpath
        value: "/argocd"

  - name: vault
    namespace: vault
    chart: hashicorp/vault
    version: 0.32.0
    values:
      - vault/values.yaml
    createNamespace: true

  - name: cronjobs
    namespace: ai-agents
    chart: ./cronjobs/helm
    values:
      - environments/{{ .Environment.Name }}.yaml

  - name: pai-responder
    namespace: ai-agents
    chart: ./pai-responder/helm
    condition: paiResponder.enabled
    needs:
      - ai-agents/cronjobs
    values:
      - environments/{{ .Environment.Name }}.yaml

  - name: cloudflared
    namespace: cloudflared
    chart: ./cloudflared/helm
    condition: cloudflared.enabled
    createNamespace: true
