repositories:
  - name: hashicorp
    url: https://helm.releases.hashicorp.com

# Environments map to per-cluster values files. Use: helmfile -e m1 apply
# ArgoCD uses these same files for ongoing GitOps sync (see argocd/).
environments:
  default:
    values:
      - environments/default.yaml
  m1:
    values:
      - environments/m1.yaml
  kyle-m2:
    values:
      - environments/kyle-m2.yaml
---
releases:
  - name: vault
    namespace: vault
    chart: hashicorp/vault
    version: 0.32.0
    values:
      - vault/values.yaml
    createNamespace: true

  - name: cronjobs
    namespace: ai-agents
    chart: ./cronjobs/helm

  - name: pai-responder
    namespace: ai-agents
    chart: ./pai-responder/helm
    condition: paiResponder.enabled
    needs:
      - ai-agents/cronjobs
