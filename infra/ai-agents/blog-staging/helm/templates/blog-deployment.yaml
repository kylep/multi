apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog
  namespace: blog-staging
spec:
  replicas: {{ .Values.blog.replicas }}
  selector:
    matchLabels:
      app: blog-staging
  template:
    metadata:
      labels:
        app: blog-staging
    spec:
      initContainers:
        - name: build
          image: node:20-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              apk add --no-cache git >/dev/null 2>&1
              git clone --depth 1 -b {{ .Values.blog.branch }} {{ .Values.blog.repo }} /tmp/repo
              cd /tmp/repo/apps/blog
              git config --global --add safe.directory /tmp/repo
              cd blog
              npm install --maxsockets=1 --loglevel=warn
              npm run build
              cp out/index1.html out/index.html
              node scripts/generate-sitemap.mjs
              node scripts/generate-rss.mjs
              cp -r out/* /output/
          volumeMounts:
            - name: html
              mountPath: /output
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 3Gi
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
      volumes:
        - name: html
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: blog-nginx-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: blog-nginx-config
  namespace: blog-staging
data:
  default.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;
        location / {
            try_files $uri $uri.html $uri/ =404;
        }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: blog
  namespace: blog-staging
spec:
  type: ClusterIP
  selector:
    app: blog-staging
  ports:
    - port: 80
      targetPort: 80
