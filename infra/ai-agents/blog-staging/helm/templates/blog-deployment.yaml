apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog
  namespace: blog-staging
spec:
  replicas: {{ .Values.blog.replicas }}
  selector:
    matchLabels:
      app: blog-staging
  template:
    metadata:
      labels:
        app: blog-staging
    spec:
      containers:
        - name: nginx
          image: "{{ .Values.blog.image }}:{{ .Values.blog.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: blog
  namespace: blog-staging
spec:
  type: ClusterIP
  selector:
    app: blog-staging
  ports:
    - port: 80
      targetPort: 80
