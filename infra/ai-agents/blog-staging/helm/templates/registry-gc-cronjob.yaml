apiVersion: batch/v1
kind: CronJob
metadata:
  name: registry-gc
  namespace: blog-staging
spec:
  schedule: {{ .Values.registry.gcSchedule | quote }}
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: gc
              image: alpine:3
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  apk add --no-cache curl jq >/dev/null 2>&1
                  REGISTRY="http://registry.blog-staging.svc.cluster.local:5000"
                  KEEP={{ .Values.registry.keepTags }}

                  for REPO in $(curl -sf "$REGISTRY/v2/_catalog" | jq -r '.repositories[]'); do
                    TAGS=$(curl -sf "$REGISTRY/v2/$REPO/tags/list" | jq -r '.tags // [] | .[]' | sort -V)
                    COUNT=$(echo "$TAGS" | grep -c . || true)
                    if [ "$COUNT" -le "$KEEP" ]; then
                      echo "$REPO: $COUNT tags, nothing to prune"
                      continue
                    fi
                    # Delete oldest tags, keep the newest $KEEP
                    DELETE=$(echo "$TAGS" | head -n $(( COUNT - KEEP )))
                    for TAG in $DELETE; do
                      DIGEST=$(curl -sf -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
                        -I "$REGISTRY/v2/$REPO/manifests/$TAG" \
                        | grep -i docker-content-digest | awk '{print $2}' | tr -d '\r')
                      if [ -n "$DIGEST" ]; then
                        curl -sf -X DELETE "$REGISTRY/v2/$REPO/manifests/$DIGEST"
                        echo "$REPO:$TAG deleted (digest $DIGEST)"
                      fi
                    done
                  done
              resources:
                requests:
                  cpu: 50m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
