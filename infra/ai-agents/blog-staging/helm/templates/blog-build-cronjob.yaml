apiVersion: v1
kind: ServiceAccount
metadata:
  name: blog-builder
  namespace: blog-staging
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: blog-builder
  namespace: blog-staging
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: blog-builder
  namespace: blog-staging
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: blog-builder
subjects:
  - kind: ServiceAccount
    name: blog-builder
    namespace: blog-staging
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: blog-build-cache
  namespace: blog-staging
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 100Mi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: blog-build
  namespace: blog-staging
spec:
  schedule: {{ .Values.build.schedule | quote }}
  timeZone: "UTC"
  startingDeadlineSeconds: 300
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 120
      ttlSecondsAfterFinished: 300
      template:
        spec:
          serviceAccountName: blog-builder
          restartPolicy: Never
          containers:
            - name: check-and-restart
              image: bitnami/kubectl:latest
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  LAST=$(cat /cache/last-built-commit 2>/dev/null || echo "none")
                  HEAD=$(curl -sf "https://api.github.com/repos/kylep/multi/commits/{{ .Values.blog.branch }}" \
                    | grep -m1 '"sha"' | sed 's/.*"sha": "//;s/".*//')
                  echo "Last built: $LAST"
                  echo "Remote HEAD: $HEAD"
                  if [ -z "$HEAD" ]; then
                    echo "ERROR: Failed to fetch remote HEAD. Skipping."
                    exit 1
                  fi
                  if [ "$LAST" = "$HEAD" ]; then
                    echo "No new commits. Skipping."
                    exit 0
                  fi
                  echo "New commit detected. Restarting blog deployment."
                  kubectl -n blog-staging rollout restart deployment/blog
                  kubectl -n blog-staging rollout status deployment/blog --timeout=300s
                  echo "$HEAD" > /cache/last-built-commit
              volumeMounts:
                - name: cache
                  mountPath: /cache
              resources:
                requests:
                  cpu: 50m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
          volumes:
            - name: cache
              persistentVolumeClaim:
                claimName: blog-build-cache
