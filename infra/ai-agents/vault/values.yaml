# Vault Helm chart values for the ai-agents stack.
# Standalone mode, file storage, no TLS (internal only), no UI.
# Audit logging is enabled post-init via: vault audit enable file file_path=stdout

server:
  enabled: true
  standalone:
    enabled: true
    config: |
      ui = false
      listener "tcp" {
        tls_disable = 1
        address = "[::]:8200"
        cluster_address = "[::]:8201"
      }
      storage "file" {
        path = "/vault/data"
      }
      seal "gcpckms" {
        project     = "kylepericak"
        region      = "us-east1"
        key_ring    = "vault-unseal"
        crypto_key  = "ai-agents"
      }
      log_level = "info"

  dataStorage:
    enabled: true
    size: 1Gi
    storageClass: "local-path"
    accessMode: ReadWriteOnce

  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 250m

  extraEnvironmentVars:
    GOOGLE_APPLICATION_CREDENTIALS: /vault/userconfig/gcp-credentials/gcp-credentials.json

  extraVolumes:
    - type: secret
      name: gcp-credentials

  securityContext:
    runAsNonRoot: true
    runAsUser: 100
    runAsGroup: 1000

  ingress:
    enabled: false

  replicas: 1

injector:
  enabled: true
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 250m

ui:
  enabled: false
