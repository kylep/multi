apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-{{ .Values.blog.branchSlug }}
  namespace: blog-staging
  labels:
    app: blog-branch
    branch: {{ .Values.blog.branchSlug }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blog-branch
      branch: {{ .Values.blog.branchSlug }}
  template:
    metadata:
      labels:
        app: blog-branch
        branch: {{ .Values.blog.branchSlug }}
    spec:
      initContainers:
        - name: build
          image: node:20-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              apk add --no-cache git >/dev/null 2>&1
              git clone --depth 1 -b {{ .Values.blog.branch }} {{ .Values.blog.repo }} /tmp/repo
              cd /tmp/repo
              git config --global --add safe.directory /tmp/repo
              if [ -f apps/games/robot-battle/package.json ]; then
                echo "Building robot-battle..."
                cd apps/games/robot-battle
                npm install --maxsockets=1 --loglevel=warn
                npm run build
                mkdir -p /tmp/repo/apps/blog/blog/public/games/robot-battle
                cp -r dist/* /tmp/repo/apps/blog/blog/public/games/robot-battle/
                cd /tmp/repo
              fi
              cd apps/blog/blog
              npm install --maxsockets=1 --loglevel=warn
              npm run build
              cp out/index1.html out/index.html
              node scripts/generate-sitemap.mjs
              node scripts/generate-rss.mjs
              cp -r out/* /output/
          volumeMounts:
            - name: html
              mountPath: /output
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
      volumes:
        - name: html
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: blog-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: blog-{{ .Values.blog.branchSlug }}
  namespace: blog-staging
spec:
  type: ClusterIP
  selector:
    app: blog-branch
    branch: {{ .Values.blog.branchSlug }}
  ports:
    - port: 80
      targetPort: 80
