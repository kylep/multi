# Vector DaemonSet — collects K8s pod logs and ships to OpenObserve.
# Credentials injected from the openobserve-credentials K8s secret (created by bootstrap.sh).

role: "Agent"  # DaemonSet mode — runs on every node

# Agent mode doesn't expose any ports — disable the Service to avoid validation errors.
service:
  enabled: false

tolerations:
  - operator: Exists

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 256Mi

# Inject OpenObserve credentials from K8s secret as env vars.
# Vector config references them as ${OPENOBSERVE_EMAIL} and ${OPENOBSERVE_PASSWORD}.
envFrom:
  - secretRef:
      name: openobserve-credentials

customConfig:
  data_dir: /vector-data-dir

  sources:
    kubernetes_logs:
      type: kubernetes_logs
      # Exclude Vector's own logs to avoid loops
      exclude_paths_glob_patterns:
        - /var/log/pods/openobserve_vector-*/**/*.log

  transforms:
    # Merge multi-line log entries (e.g. Python tracebacks).
    # Lines starting with a timestamp begin a new logical entry;
    # continuation lines are merged into the previous entry (5s timeout).
    merge_multiline:
      type: reduce
      inputs: [kubernetes_logs]
      group_by:
        - file
      merge_strategies:
        message: concat_newline
      starts_when:
        type: vrl
        source: |
          match(string!(.message), r'^\d{4}-\d{2}-\d{2}') == true
      expire_after_ms: 5000
    add_cluster_metadata:
      type: remap
      inputs: [merge_multiline]
      source: |
        # Flatten K8s metadata into top-level fields for OpenObserve
        .k8s_namespace = .kubernetes.pod_namespace
        .k8s_pod       = .kubernetes.pod_name
        .k8s_container = .kubernetes.container_name
        .k8s_node      = .kubernetes.pod_node_name
        del(.kubernetes)
        del(.file)
        # Extract log level from message (e.g. "2026-03-25T12:00:00 INFO ..." or "[ERROR] ...")
        parsed, err = parse_regex(.message, r'(?i)(?:^[\d\-T:Z\.\+]+ |\[)(?P<level>DEBUG|INFO|WARNING|WARN|ERROR|CRITICAL|FATAL)[\] ]')
        if err == null {
          .log_level = downcase(string!(parsed.level))
        } else {
          .log_level = "unknown"
        }

  sinks:
    openobserve:
      type: http
      inputs: [add_cluster_metadata]
      uri: "http://openobserve-openobserve-standalone.openobserve.svc.cluster.local:5080/obs/api/default/k8s_logs/_json"
      method: post
      auth:
        strategy: basic
        user: "${ZO_ROOT_USER_EMAIL}"
        password: "${ZO_ROOT_USER_PASSWORD}"
      encoding:
        codec: json
      batch:
        max_bytes: 1048576
        timeout_secs: 10
      request:
        headers:
          Content-Type: "application/json"
