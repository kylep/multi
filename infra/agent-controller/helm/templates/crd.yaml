apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agenttasks.agents.kyle.pericak.com
  labels:
    {{- include "agent-controller.labels" . | nindent 4 }}
spec:
  group: agents.kyle.pericak.com
  names:
    kind: AgentTask
    listKind: AgentTaskList
    plural: agenttasks
    singular: agenttask
    shortNames:
      - at
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - agent
                - prompt
              properties:
                agent:
                  type: string
                runtime:
                  type: string
                  enum: ["claude", "opencode"]
                  default: "claude"
                prompt:
                  type: string
                schedule:
                  type: string
                trigger:
                  type: string
                  enum: ["manual", "scheduled", "webhook"]
                  default: "manual"
                readOnly:
                  type: boolean
                  default: false
                allowedTools:
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: ["Pending", "Running", "Succeeded", "Failed"]
                lastRunTime:
                  type: string
                  format: date-time
                jobName:
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Agent
          type: string
          jsonPath: .spec.agent
        - name: Trigger
          type: string
          jsonPath: .spec.trigger
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Last Run
          type: date
          jsonPath: .status.lastRunTime
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
