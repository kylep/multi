{{- $existing := (lookup "v1" "Secret" .Release.Namespace "agent-secrets") -}}
apiVersion: v1
kind: Secret
metadata:
  name: agent-secrets
  labels:
    {{- include "agent-controller.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if $existing }}
  ANTHROPIC_API_KEY: {{ index $existing.data "ANTHROPIC_API_KEY" | default ("" | b64enc) }}
  ANTHROPIC_BASE_URL: {{ index $existing.data "ANTHROPIC_BASE_URL" | default ("https://openrouter.ai/api" | b64enc) }}
  ANTHROPIC_AUTH_TOKEN: {{ index $existing.data "ANTHROPIC_AUTH_TOKEN" | default ("" | b64enc) }}
  OPENROUTER_API_KEY: {{ index $existing.data "OPENROUTER_API_KEY" | default ("" | b64enc) }}
  CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: {{ index $existing.data "CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC" | default ("1" | b64enc) }}
  REPO_URL: {{ index $existing.data "REPO_URL" | default (.Values.repo.url | b64enc) }}
  REPO_BRANCH: {{ index $existing.data "REPO_BRANCH" | default (.Values.repo.branch | b64enc) }}
  DISCORD_BOT_TOKEN: {{ index $existing.data "DISCORD_BOT_TOKEN" | default ("" | b64enc) }}
  DISCORD_GUILD_ID: {{ index $existing.data "DISCORD_GUILD_ID" | default ("" | b64enc) }}
  AI_WEBHOOK_TOKEN: {{ index $existing.data "AI_WEBHOOK_TOKEN" | default ("" | b64enc) }}
  CLAUDE_CODE_OAUTH_TOKEN: {{ index $existing.data "CLAUDE_CODE_OAUTH_TOKEN" | default ("" | b64enc) }}
  GITHUB_TOKEN: {{ index $existing.data "GITHUB_TOKEN" | default ("" | b64enc) }}
  DISCORD_WEBHOOK_URL: {{ index $existing.data "DISCORD_WEBHOOK_URL" | default ("" | b64enc) }}
  {{- else }}
  ANTHROPIC_API_KEY: {{ "" | b64enc }}
  ANTHROPIC_BASE_URL: {{ "https://openrouter.ai/api" | b64enc }}
  ANTHROPIC_AUTH_TOKEN: {{ .Values.secrets.openrouterApiKey | b64enc }}
  OPENROUTER_API_KEY: {{ .Values.secrets.openrouterApiKey | b64enc }}
  CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: {{ "1" | b64enc }}
  REPO_URL: {{ .Values.secrets.repoUrl | default .Values.repo.url | b64enc }}
  REPO_BRANCH: {{ .Values.repo.branch | b64enc }}
  DISCORD_BOT_TOKEN: {{ .Values.secrets.discordBotToken | b64enc }}
  DISCORD_GUILD_ID: {{ .Values.secrets.discordGuildId | b64enc }}
  AI_WEBHOOK_TOKEN: {{ .Values.secrets.webhookToken | b64enc }}
  CLAUDE_CODE_OAUTH_TOKEN: {{ .Values.secrets.claudeCodeOauthToken | b64enc }}
  GITHUB_TOKEN: {{ .Values.secrets.githubToken | b64enc }}
  DISCORD_WEBHOOK_URL: {{ .Values.secrets.discordWebhookUrl | b64enc }}
  {{- end }}
