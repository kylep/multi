apiVersion: v1
kind: Secret
metadata:
  name: agent-secrets
  labels:
    {{- include "agent-controller.labels" . | nindent 4 }}
type: Opaque
data:
  ANTHROPIC_API_KEY: {{ "" | b64enc }}
  ANTHROPIC_BASE_URL: {{ "https://openrouter.ai/api" | b64enc }}
  ANTHROPIC_AUTH_TOKEN: {{ .Values.secrets.openrouterApiKey | b64enc }}
  OPENROUTER_API_KEY: {{ .Values.secrets.openrouterApiKey | b64enc }}
  CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: {{ "1" | b64enc }}
  REPO_URL: {{ .Values.secrets.repoUrl | default .Values.repo.url | b64enc }}
