apiVersion: v1
kind: PersistentVolume
metadata:
  name: agent-workspace-pv
  labels:
    {{- include "agent-controller.labels" . | nindent 4 }}
spec:
  capacity:
    storage: {{ .Values.storage.size }}
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: {{ .Values.storage.hostPath }}
    type: DirectoryOrCreate
  storageClassName: ""
  persistentVolumeReclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agent-workspace
  labels:
    {{- include "agent-controller.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.storage.size }}
  storageClassName: ""
  volumeName: agent-workspace-pv
