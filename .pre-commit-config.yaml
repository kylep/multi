repos:
- repo: local
  hooks:
    - id: semgrep
      name: Semgrep
      description: Static analysis scan using the security toolkit image.
      entry: bash -c 'docker run -v "$(pwd):/workspace:ro" --rm kpericak/ai-security-toolkit-1:0.2 -c "semgrep scan --config auto --error /workspace"'
      language: system
      stages: ["pre-commit", "pre-push"]
    - id: gitleaks
      name: Gitleaks
      description: Scan for leaked secrets using the security toolkit image.
      entry: bash -c 'docker run -v "$(pwd):/workspace:ro" --rm kpericak/ai-security-toolkit-1:0.2 -c "cd /workspace && gitleaks detect --source ."'
      language: system
      stages: ["pre-commit", "pre-push"]
