repos:
- repo: local
  hooks:
    - id: trufflehog
      name: TruffleHog
      description: Detect secrets in your data.
      # entry: bash -c 'trufflehog git file://. --since-commit HEAD --only-verified --fail'
      # For running trufflehog in docker, use the following entry instead:
      entry: bash -c 'docker run -v "$(pwd):/workdir" -i --rm trufflesecurity/trufflehog:latest git file:///workdir --since-commit HEAD --fail'
      language: system
      stages: ["commit", "push"]
    - id: gitleaks
      name: Gitleaks
      description: Scan for leaked secrets using the security toolkit image.
      entry: bash -c 'PATH="/Users/kp/.rd/bin:$PATH" docker run -v "$(pwd):/workspace" --rm kpericak/ai-security-toolkit-1:0.1 -c "gitleaks detect --source /workspace --no-git"'
      language: system
      stages: ["commit", "push"]
